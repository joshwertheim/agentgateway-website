name: Playwright screenshots (Kubernetes)

on:
  schedule:
    # Nightly at 07:00 UTC, an hour after the standalone run, to refresh the Kubernetes
    # (read-only) Admin UI screenshots and open a PR if they drift.
    - cron: '0 7 * * *'
  workflow_dispatch:

# Keep nightly and manual runs from overlapping.
concurrency:
  group: playwright-screenshots-kube
  cancel-in-progress: false

permissions:
  contents: write
  pull-requests: write

jobs:
  screenshots-kube:
    name: Regenerate Kubernetes UI screenshots and open a PR
    runs-on: ubuntu-latest
    timeout-minutes: 90

    steps:
      - name: Checkout website repo
        uses: actions/checkout@v6

      # Cluster bring-up reuses the doc-tests machinery (scripts/doc_test_run.py): Python +
      # pyyaml, Go for cloud-provider-kind, and yamltest. kind/kubectl/helm are preinstalled on
      # the runner (same assumption as .github/workflows/doc-tests.yaml).
      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.x'

      - name: Install Python dependencies
        run: pip install pyyaml

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: 'stable'

      - name: Install cloud-provider-kind
        run: |
          go install sigs.k8s.io/cloud-provider-kind@latest
          echo "$(go env GOPATH)/bin" >> "$GITHUB_PATH"

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: 'playwright/package-lock.json'

      - name: Install Playwright dependencies
        working-directory: playwright
        run: |
          npm ci
          npx playwright install --with-deps chromium

      - name: Install yamltest
        run: npm install -g yamltest@latest

      # For each docs version: bring up a kind cluster populated by the `capture` doc-test
      # scenario (gateway + mcp + httpbin + an LLM route + a CORS policy), leave it running,
      # port-forward the proxy's Admin UI, capture the read-only views, then delete the cluster.
      # The chart version is driven by the docs (helm.md uses n-patch), so `latest` runs the
      # released build and `main` the nightly — version handling comes for free. Capture latest
      # before main so the main sync-docs (publish-on-diff) can compare against latest baselines.
      - name: Capture Kubernetes UI (latest + main)
        run: |
          set -euo pipefail
          for v in latest main; do
            page="content/docs/kubernetes/$v/observability/ui.md"
            echo "::group::kube capture — $v"
            python3 scripts/doc_test_run.py --repo-root . \
              --file "$page" --test capture \
              --keep-cluster --keep-cluster-file "out/tests/kept-$v.txt"

            cluster="$(cat "out/tests/kept-$v.txt")"
            ctx="kind-$cluster"
            echo "Using kept cluster '$cluster' (context '$ctx')"

            kubectl --context "$ctx" port-forward deployment/agentgateway-proxy \
              -n agentgateway-system 15000:15000 &
            pf=$!
            for i in $(seq 1 60); do
              curl -sf -o /dev/null http://localhost:15000/ui/ && break
              sleep 2
            done

            ( cd playwright && \
              DOC_VERSION="$v" UI_BASE_URL=http://localhost:15000 npm run test:kube -- --update-snapshots && \
              DOC_VERSION="$v" npm run sync-docs )

            kill "$pf" 2>/dev/null || true
            kind delete cluster --name "$cluster"
            echo "::endgroup::"
          done

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-screenshot-report-kube
          path: |
            playwright/playwright-report
            playwright/test-results
          retention-days: 7

      - name: Open PR with refreshed Kubernetes screenshots
        id: create-pr
        uses: peter-evans/create-pull-request@v7
        with:
          base: main
          branch: playwright/screenshot-refresh-kube
          delete-branch: true
          add-paths: |
            assets/img
            playwright/__screenshots__
          commit-message: |
            docs: refresh Kubernetes Admin UI screenshots (latest + main)

            Regenerated by the playwright-screenshots-kube workflow against a kind cluster
            (read-only xds-mode UI). latest uses the released chart, main the nightly. main
            images publish to img/main/ only where they diverge from latest.

            Signed-off-by: GitHub Action <action@github.com>
          committer: GitHub Action <action@github.com>
          title: '[Automated] Refresh Kubernetes Admin UI screenshots'
          body: |
            Regenerated the Kubernetes (read-only) Admin UI screenshots by standing up a kind
            cluster via the doc-tests `capture` scenario, port-forwarding the proxy, and running
            `npm run test:kube` for each docs version.

            **Review the image diffs visually** before merging: a change here means the live
            Kubernetes UI no longer matches the committed screenshots. If `main` diverged from
            `latest`, see the workflow log for which images now have an `img/main/` variant and
            add a `{{< version include-if="1.4.x" >}}` split for them.

            Workflow run: https://github.com/agentgateway/website/actions/runs/${{ github.run_id }}
          token: ${{ secrets.GH_TOKEN }}

      - name: Report PR result
        run: |
          if [ -n "${{ steps.create-pr.outputs.pull-request-url }}" ]; then
            echo "Kubernetes screenshots changed — PR: ${{ steps.create-pr.outputs.pull-request-url }}"
          else
            echo "No Kubernetes screenshot changes — UI matches the committed images."
          fi
